version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: opmd_admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: opmd_triage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://opmd_admin:supersecretpassword@db:5432/opmd_triage
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
